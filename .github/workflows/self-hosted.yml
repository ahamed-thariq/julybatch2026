name: Self Hosted CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add Maven to GitHub Actions Path
        run: echo "C:\Program Files\apache-maven-3.9.16\bin" >> $env:GITHUB_PATH
        shell: powershell

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven         

      - name: Build with Maven
        run: mvn clean install
          
      - name: Run tests
        run: mvn -B test

      - name: Build package
        run: mvn -B package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-website
          path: target/*.jar
